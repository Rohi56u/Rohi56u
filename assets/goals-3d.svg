<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
<defs>
  <style>
    @keyframes fill1 { from { width: 0; } to { width: 585px; } }
    @keyframes fill2 { from { width: 0; } to { width: 450px; } }
    @keyframes fill3 { from { width: 0; } to { width: 630px; } }
    @keyframes fill4 { from { width: 0; } to { width: 495px; } }
    @keyframes fill5 { from { width: 0; } to { width: 540px; } }
    @keyframes glow { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .b1 { animation: fill1 2s ease-out forwards; animation-delay: 0.2s; }
    .b2 { animation: fill2 2s ease-out forwards; animation-delay: 0.4s; }
    .b3 { animation: fill3 2s ease-out forwards; animation-delay: 0.6s; }
    .b4 { animation: fill4 2s ease-out forwards; animation-delay: 0.8s; }
    .b5 { animation: fill5 2s ease-out forwards; animation-delay: 1.0s; }
    .glow { animation: glow 2s ease-in-out infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#020810"/><stop offset="100%" stop-color="#050e1e"/>
  </linearGradient>
  <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7928ca"/>
  </linearGradient>
  <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7928ca"/><stop offset="100%" stop-color="#ff6b35"/>
  </linearGradient>
  <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ff88"/><stop offset="100%" stop-color="#00d4ff"/>
  </linearGradient>
  <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff6b35"/><stop offset="100%" stop-color="#7928ca"/>
  </linearGradient>
  <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#00ff88"/>
  </linearGradient>
  <filter id="bg-glow" x="-5%" y="-20%" width="110%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="900" height="200" fill="url(#bg4)"/>

<!-- Title -->
<text x="450" y="28" font-family="'Courier New',monospace" font-size="13" font-weight="700"
      fill="#00d4ff" text-anchor="middle" letter-spacing="6" class="pulse">🎯 2026 MISSION OBJECTIVES 🎯</text>
<line x1="80" y1="36" x2="820" y2="36" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>

<!-- BAR 1 -->
<text x="20" y="65" font-family="'Courier New',monospace" font-size="11" fill="#aaaaaa">200+ Repositories</text>
<text x="870" y="65" font-family="'Courier New',monospace" font-size="11" fill="#00d4ff" text-anchor="end">85%</text>
<!-- Track -->
<rect x="20" y="70" width="700" height="10" rx="5" fill="#0d1f33" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
<!-- Fill (starts at 0, animates to 85% of 700 = 595) -->
<rect x="20" y="70" width="0" height="10" rx="5" fill="url(#bar1)" class="b1" filter="url(#bg-glow)"/>

<!-- BAR 2 -->
<text x="20" y="103" font-family="'Courier New',monospace" font-size="11" fill="#aaaaaa">AI SaaS Product Launch</text>
<text x="870" y="103" font-family="'Courier New',monospace" font-size="11" fill="#c084fc" text-anchor="end">60%</text>
<rect x="20" y="108" width="700" height="10" rx="5" fill="#0d1f33" stroke="#7928ca" stroke-width="0.5" opacity="0.5"/>
<rect x="20" y="108" width="0" height="10" rx="5" fill="url(#bar2)" class="b2" filter="url(#bg-glow)"/>

<!-- BAR 3 -->
<text x="20" y="141" font-family="'Courier New',monospace" font-size="11" fill="#aaaaaa">Cybersecurity Certification</text>
<text x="870" y="141" font-family="'Courier New',monospace" font-size="11" fill="#00ff88" text-anchor="end">78%</text>
<rect x="20" y="146" width="700" height="10" rx="5" fill="#0d1f33" stroke="#00ff88" stroke-width="0.5" opacity="0.5"/>
<rect x="20" y="146" width="0" height="10" rx="5" fill="url(#bar3)" class="b3" filter="url(#bg-glow)"/>

<!-- BAR 4 -->
<text x="20" y="179" font-family="'Courier New',monospace" font-size="11" fill="#aaaaaa">Open-Source Contributions</text>
<text x="870" y="179" font-family="'Courier New',monospace" font-size="11" fill="#ff6b35" text-anchor="end">65%</text>
<rect x="20" y="184" width="700" height="10" rx="5" fill="#0d1f33" stroke="#ff6b35" stroke-width="0.5" opacity="0.5"/>
<rect x="20" y="184" width="0" height="10" rx="5" fill="url(#bar4)" class="b4" filter="url(#bg-glow)"/>

<!-- Right side decorative -->
<text x="755" y="78" font-family="'Courier New',monospace" font-size="10" fill="#00d4ff" opacity="0.6">████████░░</text>
<text x="755" y="116" font-family="'Courier New',monospace" font-size="10" fill="#c084fc" opacity="0.6">██████░░░░</text>
<text x="755" y="154" font-family="'Courier New',monospace" font-size="10" fill="#00ff88" opacity="0.6">███████░░░</text>
<text x="755" y="192" font-family="'Courier New',monospace" font-size="10" fill="#ff6b35" opacity="0.6">██████░░░░</text>
</svg>
